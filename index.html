<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M&M-COMMUNITY - Admin Modus</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #dashboard::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 61, 143, 0.15) 0%, transparent 70%);
            pointer-events: none; z-index: 1;
        }

        /* ANIMATIONEN */
        @keyframes pulseBlue { 0% { box-shadow: 0 0 5px #0088ff; } 50% { box-shadow: 0 0 25px #0088ff; } 100% { box-shadow: 0 0 5px #0088ff; } }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        .num-offen { background-color: #0088ff !important; box-shadow: 0 0 20px #0088ff, inset 0 0 10px #ffffff; border: 1px solid #fff !important; animation: pulseBlue 2s infinite; }
        .num-neutral { background-color: #003d8f; }
        .num-gelesen { background-color: #00ff00 !important; box-shadow: 0 0 15px #00ff00; } 
        .num-arbeit { background-color: #ffd700 !important; color: #000 !important; box-shadow: 0 0 15px #ffd700; } 

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); grid-auto-flow: column; gap: 10px; width: 95%; max-width: 1450px; margin-top: 15px; border: 3px solid #00ff00; padding: 15px; border-radius: 10px; flex-shrink: 0; z-index: 2; }
        .box { display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 58px; position: relative; overflow: hidden; }
        .num { width: 38px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 0.85rem; }
        .text { padding: 4px 8px; text-transform: uppercase; font-size: 0.6rem; display: flex; align-items: center; cursor: pointer; flex-grow: 1; font-weight: 600; }

        #page-skelett { display: none; width: 100%; flex-direction: column; align-items: center; height: 100vh; }
        .info-section-ebene { width: 90% !important; height: 26vh; border: 2px solid #003d8f; background-color: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; margin-top: 1vh; }

        /* VIDEO GRID 8 SLOTS */
        .video-grid-8 { display: none; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; width: 100%; height: 100%; background: #000; padding: 5px; box-sizing: border-box; }
        .video-slot { border: 1px solid #003d8f; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; color: #333; position: relative; overflow: hidden; }
        .slot-user { border: 2px solid #00ff00 !important; box-shadow: 0 0 15px #00ff00; }
        .slot-label { position: absolute; bottom: 2px; left: 5px; color: #00ff00; font-size: 0.4rem; z-index: 10; }

        /* BARRIEREN */
        .gesperrt { opacity: 0.2 !important; cursor: not-allowed !important; filter: grayscale(1); pointer-events: none; }
        .freigeschaltet { opacity: 1 !important; animation: pulseBlue 1.5s infinite; pointer-events: auto; }

        #chat-box { height: 40vh !important; padding: 15px; border: 1px solid #003d8f; background: rgba(0,0,0,0.5); overflow-y: auto; width: 90%; }
        .bottom-nav { display: flex; justify-content: space-between; width: 100%; padding: 10px 20px; position: fixed; bottom: 0; background: #000; z-index: 100; border-top: 1px solid #333; }
        .nav-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="dashboard" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="grid" id="main-grid"></div>
        <div style="margin-top: 20px;">
            <input type="email" id="db-anker-mail" placeholder="E-Mail Anker..." style="background: transparent; border: 1px solid #003d8f; color: #fff; padding: 10px; width: 250px;">
            <button onclick="sichereAnkerUndStarteScan(0, themen[0])" class="nav-btn">ANKER SETZEN</button>
        </div>
    </div>

    <div id="page-skelett">
        <h1 id="info-titel" style="text-transform: uppercase; font-size: 1.5rem;"></h1>
        <div class="info-section-ebene">
            <div id="werbe-bg" style="position:absolute; width:100%; height:100%; background-size:cover; opacity:0.4;"></div>
            <div id="v-grid-area" class="video-grid-8"></div>
        </div>

        <div style="display:flex; gap:50px; margin: 10px 0;">
            <div onclick="ebene=4; updateUI(); starteVideoKonferenz();" id="sig-l4" class="gesperrt" style="text-align:center;">
                <div style="width:40px; height:20px; background:red; border-radius:10px; margin:auto;"></div>
                <span style="font-size:0.5rem; color:red;">OFFENBAREN</span>
            </div>
            <div onclick="ebene=3; updateUI();" id="sig-r4" class="gesperrt" style="text-align:center;">
                <div style="width:40px; height:20px; background:yellow; border-radius:10px; margin:auto;"></div>
                <span style="font-size:0.5rem; color:yellow;">SCHREIBEN</span>
            </div>
        </div>

        <div id="ebene2-content" style="width:90%; color:#ccc; font-size:0.9rem; text-align:justify; margin-bottom:10px;">
            <div id="ki-scan-box" style="border-left: 3px solid red; padding-left:10px; font-family:monospace; margin-bottom:10px;"></div>
            <p id="main-text"></p>
        </div>

        <div id="chat-box"></div>
        <div style="width:90%; display:flex; margin-top:5px;">
            <input type="text" id="chat-input" placeholder="Wahrheit..." style="flex:1; background:#111; border:1px solid #003d8f; color:#fff; padding:10px;">
            <button onclick="registriereSenden()" class="nav-btn">SENDEN</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="showDashboard()">← Dashboard</button>
        <button class="nav-btn" onclick="nextEbene()">Weiter →</button>
    </div>

<script>
    const themen = ["Recht auf Gefühlsvorderung", "Wie werde ich Mensch", "Glaube an Friede", "Programm für Bürgerliche Rechte", "Moralische Pflicht und Verantwortung", "Menschlichkeit Wiederherstellung", "Kinderschutz-Pflicht-Elternrechte", "Wahre Richtung und Kunst", "LGBTQ und Kirche", "Trend und Tradition", "Religionsbekenntnis oder Selbstwahl", "Gesundheitswesen und Verhalten", "Arbeitswelt und Du", "Mobbing am Arbeitsplatz", "Jugendsprecher", "Ratgeber für Pensionisten", "Sozialgefallen und Widerkehr", "Nachbarschaft und Gemeinschaft", "Alleinerziehend", "Die Brücke"];
    const sektorTexte = [
        "Sektor 1: Das Vordern von Gefühlen ist das Fundament der Freiheit...",
        "Sektor 2: Wahrhaftigkeit ist der einzige Kompass im Chaos...",
        "Sektor 3: Heilung beginnt dort, wo der Hass endet...",
        "Sektor 4: Souveränität ist ein innerer Prozess..."
    ];

    let ebene = 1, tId = 0, interaktionsZaehler = Array(20).fill(0), scanAbgeschlossen = false;

    const grid = document.getElementById('main-grid');
    themen.forEach((t, i) => { 
        grid.innerHTML += `<div class="box" id="box-${i}"><div class="num num-neutral" id="num-${i}">${i+1}</div><div class="text">${t}</div></div>`; 
    });

    function showInfo(id) {
        tId = id; ebene = 2; scanAbgeschlossen = false;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('page-skelett').style.display = 'flex';
        document.getElementById('info-titel').innerText = themen[id];
        document.getElementById('main-text').innerText = sektorTexte[id] || "Analysiere Sektor-Daten...";
        updateUI();
        simulateScan();
    }

    function simulateScan() {
        const box = document.getElementById('ki-scan-box');
        box.innerHTML = "INITIALISIERE SCAN... BARRIERE AKTIV.";
        setTimeout(() => {
            box.innerHTML = "DATEN GEFUNDEN. ANALYSE LÄUFT...";
            setTimeout(() => {
                box.innerHTML = "SCAN ABGESCHLOSSEN. SCHREIB-MODUS FREIGESCHALTET.";
                scanAbgeschlossen = true;
                updateUI();
            }, 2000);
        }, 1500);
    }

    function baueVideoGrid() {
        const area = document.getElementById('v-grid-area');
        area.innerHTML = "";
        for(let i=1; i<=8; i++) {
            area.innerHTML += `
                <div class="video-slot ${i===1?'slot-user':''}" id="v-slot-${i}">
                    <span class="slot-label">SLOT ${i} ${i===1?'(DU)':''}</span>
                    <div id="status-${i}" style="color:#222; font-size:0.3rem;">${i===1?'SUCHE...':'WARTEN...'}</div>
                </div>`;
        }
    }

    async function starteVideoKonferenz() {
        const meinSlot = document.getElementById('v-slot-1');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            meinSlot.innerHTML = `<video autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>`;
            meinSlot.querySelector('video').srcObject = stream;
        } catch (err) { alert("Kamera blockiert."); }
    }

    function registriereSenden() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        document.getElementById('chat-box').innerHTML += `<div class="chat-msg-user"><strong>Schwein:</strong> ${input.value}</div>`;
        input.value = "";
        interaktionsZaehler[tId] += 5;
        updateUI();
    }

    function updateUI() {
        document.getElementById('ebene2-content').style.display = (ebene === 2) ? 'block' : 'none';
        document.getElementById('chat-box').style.display = (ebene === 3) ? 'block' : 'none';
        document.getElementById('v-grid-area').style.display = (ebene === 4) ? 'grid' : 'none';
        document.getElementById('werbe-bg').style.display = (ebene === 4) ? 'none' : 'block';

        const sigGelb = document.getElementById('sig-r4');
        const sigRot = document.getElementById('sig-l4');

        if(scanAbgeschlossen) sigGelb.className = "freigeschaltet";
        else sigGelb.className = "gesperrt";

        if(interaktionsZaehler[tId] >= 15) sigRot.className = "freigeschaltet";
        else sigRot.className = "gesperrt";
    }

    function sichereAnkerUndStarteScan(id, name) {
        document.querySelectorAll('.text').forEach((txt, i) => { txt.onclick = () => showInfo(i); });
        document.getElementById('num-0').className = "num num-offen";
        showInfo(0);
    }

    function nextEbene() { ebene++; if(ebene>4) ebene=2; updateUI(); if(ebene===4) baueVideoGrid(); }
    function showDashboard() { ebene = 1; document.getElementById('page-skelett').style.display = 'none'; document.getElementById('dashboard').style.display = 'flex'; }
</script>
</body>
</html>
