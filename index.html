<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M&M-COMMUNITY - Das Fundament</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        /* LOGO & HEADER */
        .global-community-label { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; color: #003d8f; z-index: 100; pointer-events: none; }
        .inner-community-label { position: absolute; top: 8px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(0, 61, 143, 0.7); z-index: 20; pointer-events: none; }
        .dashboard-header { width: 100%; position: absolute; top: 3%; display: flex; justify-content: flex-start; padding: 0 2%; box-sizing: border-box; z-index: 20; }
        .logo-ring { width: 110px; height: 110px; border: 3px solid #fff; background-color: #003d8f; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .logo-mm { font-size: 2rem; font-weight: 900; line-height: 0.8; }
        .logo-community { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }

        /* DAS GRID MIT GRÜNER UMRUNDUNG */
        .grid { 
            display: flex; flex-wrap: wrap; gap: 15px; width: 95%; max-width: 1450px; 
            margin-top: 160px; border: 3px solid #00ff00; padding: 25px; border-radius: 10px; 
            justify-content: flex-start; overflow-y: auto; max-height: 70vh;
        }

        .box { width: 320px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 60px; position: relative; overflow: hidden; flex-shrink: 0; }
        .box-breit { width: 655px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 60px; position: relative; overflow: hidden; flex-shrink: 0; }

        .num { width: 38px; display: flex; align-items: center; justify-content: center; background-color: #003d8f; font-weight: bold; font-size: 0.85rem; }
        .num-neutral { background-color: #003d8f !important; }
        .text { padding: 4px 8px; text-transform: uppercase; font-size: 0.65rem; display: flex; align-items: center; cursor: pointer; flex-grow: 1; font-weight: 600; }

        /* EBENEN & CHAT */
        #page-skelett, #chat-area, #drawer-ebene4 { display: none; width: 90%; flex-direction: column; align-items: center; margin-top: 120px; }
        #chat-box { height: 40vh; width: 100%; border: 1px solid #003d8f; background: rgba(0,0,0,0.5); overflow-y: auto; padding: 15px; margin-bottom: 10px; }
        
        .info-section { width: 80%; border: 2px solid #003d8f; background: #000; padding: 20px; margin-top: 120px; display: flex; flex-direction: column; align-items: center; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: flex; justify-content: space-between; border-top: 1px solid #333; z-index: 100; }
        .nav-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* VIDEO SLOTS */
        .video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .video-slot { aspect-ratio: 16/9; background: #111; border: 1px solid #003d8f; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; }

        /* ADMIN PANEL */
        #admin-panel-haut { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; background: rgba(0, 0, 0, 0.98); border: 2px solid #ffd700; z-index: 9999; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="top-label" class="global-community-label">Von M&M Community</div>

<div id="dashboard" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div class="dashboard-header">
        <div class="logo-ring"><div class="logo-mm">M&M</div><div class="logo-community">COMMUNITY</div></div>
    </div>

    <div class="info-section">
        <div id="auth-wrapper" style="display: flex; width: 100%; max-width: 600px; border: 1px solid #003d8f;">
            <div id="email-step" style="display: flex; width: 100%;">
                <input type="email" id="db-anker-mail" placeholder="E-Mail eingeben..." style="flex:1; background:transparent; border:none; color:#fff; padding:10px;">
                <button onclick="sichereAnkerUndStarteScan()" class="nav-btn">ANKER SETZEN</button>
            </div>
            <div id="code-step" style="display: none; width: 100%;">
                <input type="text" id="verification-code" placeholder="Schlüssel..." maxlength="6" style="flex:1; background:#00ff00; color:#000; text-align:center;">
                <button onclick="bestatigeCode()" class="nav-btn" style="background:#fff;">OK</button>
            </div>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>
</div>

<div id="page-skelett">
    <h1 id="info-titel"></h1>
    <p id="main-text" style="text-align: justify; padding: 20px;"></p>
    <div id="chat-area" style="display: flex;">
        <div id="chat-box"></div>
        <div style="display: flex; width: 100%;">
            <input type="text" id="chat-input" placeholder="Nachricht..." style="flex:1; padding:10px;" onkeypress="if(event.key==='Enter') registriereSenden()">
            <button onclick="registriereSenden()" class="nav-btn">SENDEN</button>
        </div>
    </div>
</div>

<div id="drawer-ebene4">
    <div class="video-grid" id="video-grid">
        <div class="video-slot" id="v-slot-1">DU</div>
        <div class="video-slot">ZUFALL</div>
        <div class="video-slot">ZUFALL</div>
        <div class="video-slot">ZUFALL</div>
    </div>
    <button onclick="starteVideoKonferenz()" class="nav-btn" style="margin-top:20px;">VIDEO STARTEN</button>
</div>

<div id="admin-panel-haut">
    <h2 style="color:#ffd700; text-align:center;">ADMIN ZENTRALE</h2>
    <div id="admin-stats" style="display:flex; justify-content:space-around; margin-top:20px;">
        <div id="sector-controls"></div>
        <div id="user-stats">Lade Seelen...</div>
    </div>
    <button onclick="document.getElementById('admin-panel-haut').style.display='none'" class="nav-btn" style="margin-top:20px; width:100%;">SCHLIESSEN</button>
</div>

<div class="bottom-nav">
    <button class="nav-btn" onclick="showDashboard()">← DASHBOARD</button>
    <button class="nav-btn" style="background:#0088ff; color:#fff;" onclick="echterExit()">EXIT / ABMELDEN</button>
</div>

<script>
    let ebene = 0, tId = 0, aktuellesThema = "";
    const themen = ["Recht auf Gefühlsvorderung", "Wie werde ich Mensch", "Glaube an Friede", "Programm für Bürgerliche Rechte", "Moralische Pflicht und Verantwortung", "Menschlichkeit Wiederherstellung", "Kinderschutz-Pflicht-Elternrechte", "Wahre Richtung und Kunst", "LGBTQ und Kirche", "Trend und Tradition", "Religionsbekenntnis oder Selbstwahl", "Gesundheitswesen und Verhalten", "Arbeitswelt und Du", "Mobbing am Arbeitsplatz", "Jugendsprecher", "Ratgeber für Pensionisten", "Sozialgefallen und Widerkehr", "Nachbarschaft und Gemeinschaft", "Alleinerziehend", "Die Brücke", "KAPITAL UND VERWALTUNG", "DAS KOLLEKTIV"];
    const sektorTexte = Array(22).fill("Deine Biografie der Wahrheit wird hier geladen...");

    function baueGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; 
        themen.forEach((t, i) => {
            const istBreit = (i >= 20);
            const klasse = istBreit ? "box-breit" : "box";
            grid.innerHTML += `
            <div class="${klasse}" id="box-${i}">
                <div class="num num-neutral" id="num-${i}">${i+1}</div>
                <div class="text" onclick="pruefeZugang('${t}', ${i})">${t}</div>
            </div>`;
        });
    }

    async function sichereAnkerUndStarteScan() {
        const email = document.getElementById('db-anker-mail').value;
        await fetch('https://mm-community.onrender.com/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
        document.getElementById('email-step').style.display = 'none';
        document.getElementById('code-step').style.display = 'flex';
    }

    async function bestatigeCode() {
        const code = document.getElementById('verification-code').value;
        const email = document.getElementById('db-anker-mail').value;
        const resp = await fetch('https://mm-community.onrender.com/verify-access', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, code}) });
        const res = await resp.json();
        if(res.success) {
            ebene = 1; alert("Anker gesetzt.");
            if(email === "mmcommunity22@gmail.com") aktiviereAdminPanel();
        }
    }

    function pruefeZugang(t, i) {
        if(ebene === 0) { alert("Bitte zuerst Code bestätigen!"); return; }
        tId = i; aktuellesThema = t;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('page-skelett').style.display = 'flex';
        document.getElementById('info-titel').innerText = t;
        document.getElementById('main-text').innerText = sektorTexte[i];
    }

    function showDashboard() { document.getElementById('page-skelett').style.display = 'none'; document.getElementById('dashboard').style.display = 'flex'; }
    function echterExit() { if(confirm("Abmelden?")) location.reload(); }

    function aktiviereAdminPanel() {
        document.getElementById('admin-panel-haut').style.display = 'block';
        fetch('https://mm-community.onrender.com/admin/stats').then(r => r.json()).then(d => {
            document.getElementById('user-stats').innerText = "Seelen im Keller: " + d.total_souls;
        });
    }

    async function registriereSenden() {
        const msg = document.getElementById('chat-input').value;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div>DU: ${msg}</div>`;
        const resp = await fetch('https://mm-community.onrender.com/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg, sector_id: String(tId)}) });
        const data = await resp.json();
        chatBox.innerHTML += `<div style="color:#003d8f;">KI: ${data.reply}</div>`;
        document.getElementById('chat-input').value = "";
    }

    window.onload = baueGrid;
</script>
</body>
</html>
