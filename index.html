<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M&M-COMMUNITY - 22 Sektoren</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* LOGO & HEADER */
        .dashboard-header { width: 100%; position: absolute; top: 3%; display: flex; justify-content: flex-start; padding: 0 2%; box-sizing: border-box; z-index: 20; }
        .logo-ring { width: 110px; height: 110px; border: 3px solid #fff; background-color: #003d8f; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .logo-mm { font-size: 2rem; font-weight: 900; line-height: 0.8; }
        .logo-community { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }

      .grid { 
    display: flex; 
    flex-wrap: wrap; /* Erlaubt den Boxen, ihren Platz selbst zu wählen */
    gap: 15px; 
    width: 95%; 
    max-width: 1450px; 
    border: 3px solid #00ff00; /* Der Rahmen umschließt 1-22 */
    padding: 25px; 
    border-radius: 10px; 
    margin-top: 30px;
    justify-content: flex-start; /* Boxen bleiben in ihrer gewohnten Sortierung */
}

/* Der Altbestand der Boxen bleibt unangetastet */
.box { 
    width: 320px; /* Deine gewohnte Breite */
    display: flex; 
    border: 2px solid #003d8f; 
    background-color: #000; 
    min-height: 60px; 
}
        .box { display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 50px; position: relative; overflow: hidden; }
        .num { width: 38px; display: flex; align-items: center; justify-content: center; background-color: #003d8f; font-weight: bold; font-size: 0.85rem; }
        .text { padding: 4px 8px; text-transform: uppercase; font-size: 0.65rem; display: flex; align-items: center; cursor: pointer; flex-grow: 1; font-weight: 600; }

        /* AUTH & INFO */
        .info-bar { display: flex; width: 90%; gap: 20px; margin-top: 120px; z-index: 10; justify-content: center; }
        #auth-wrapper { background: rgba(0, 61, 143, 0.1); border: 1px solid #003d8f; border-radius: 4px; display: flex; height: 40px; width: 500px; overflow: hidden; }
        input { background: transparent; border: none; color: #fff; padding: 0 10px; outline: none; flex: 1; font-size: 0.8rem; }
        button.action-btn { background: #ffd700; color: #000; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        /* NAVIGATION UNTEN */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; box-sizing: border-box; }
        .nav-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-exit { background: #0088ff !important; color: #fff !important; }

        /* EBENEN */
        #page-skelett, #chat-area, #drawer-ebene4 { display: none; width: 90%; flex-direction: column; align-items: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="dashboard" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="dashboard-header">
            <div class="logo-ring"><div class="logo-mm">M&M</div><div class="logo-community">COMMUNITY</div></div>
        </div>

        <div class="info-bar">
            <div id="auth-wrapper">
                <div id="email-step" style="display: flex; width: 100%;">
                    <input type="email" id="db-anker-mail" placeholder="E-Mail eingeben...">
                    <button class="action-btn" onclick="sichereAnkerUndStarteScan()">ANKER SETZEN</button>
                </div>
                <div id="code-step" style="display: none; width: 100%;">
                    <input type="text" id="verification-code" placeholder="Schlüssel eingeben..." maxlength="6">
                    <button class="action-btn" style="background: #00ff00;" onclick="bestatigeCode()">OK</button>
                </div>
            </div>
        </div>

        <div class="grid" id="main-grid"></div>
    </div>

    <!-- HIER KOMMEN DEINE EBENEN HIN (PAGE SKELETT, CHAT, VIDEO) -->
    <div id="page-skelett">
        <h1 id="info-titel"></h1>
        <p id="main-text" style="padding: 20px; text-align: justify;"></p>
    </div>

    <div class="bottom-nav">
        <button id="btn-back" class="nav-btn" onclick="location.reload()">← DASHBOARD</button>
        <button class="nav-btn btn-exit" onclick="echterExit()">EXIT / ABMELDEN</button>
    </div>

<script>
    // BASIS-DATEN (Altbestand + 21 & 22)
    let ebene = 0;
    const themen = [
        "Recht auf Gefühlsvorderung", "Wie werde ich Mensch", "Glaube an Friede", 
        "Programm für Bürgerliche Rechte", "Moralische Pflicht und Verantwortung", 
        "Menschlichkeit Wiederherstellung", "Kinderschutz-Pflicht-Elternrechte", 
        "Wahre Richtung und Kunst", "LGBTQ und Kirche", "Trend und Tradition", 
        "Religionsbekenntnis oder Selbstwahl", "Gesundheitswesen und Verhalten", 
        "Arbeitswelt und Du", "Mobbing am Arbeitsplatz", "Jugendsprecher", 
        "Ratgeber für Pensionisten", "Nachbarschaft und Gemeinschaft", 
        "Sozialgefallen und Widerkehr", "Alleinerziehend", "Die Brücke",
        "KAPITAL UND VERWALTUNG", "DAS KOLLEKTIV"
    ];

    // Diese Funktion baut die Boxen EXAKT im Altbestand-Stil
    function stelleAltbestandWiederHer() {
        const grid = document.getElementById('main-grid');
        if (!grid) return;

        grid.innerHTML = ""; // Clean Start
        
        // Wir bauen 1 bis 22 in den grünen Rahmen
        themen.forEach((t, i) => {
            grid.innerHTML += `
            <div class="box" id="box-${i}" style="flex: 0 0 auto;">
                <div class="num num-neutral" id="num-${i}">${i+1}</div>
                <div class="text" onclick="pruefeZugang('${t}', ${i})">${t}</div>
            </div>`;
        });
        
        console.log("Altbestand 1-22 wurde stabil hergestellt.");
    }

    // AUTH-LOGIK (Behält deine Verbindung zu Render/API)
    async function sichereAnkerUndStarteScan() {
        const email = document.getElementById('db-anker-mail').value.trim().toLowerCase();
        try {
            await fetch('https://mm-community.onrender.com/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            document.getElementById('email-step').style.display = 'none';
            document.getElementById('code-step').style.display = 'flex';
        } catch (e) { alert("Serververbindung fehlgeschlagen."); }
    }

    async function bestatigeCode() {
        const code = document.getElementById('verification-code').value.trim();
        const email = document.getElementById('db-anker-mail').value.trim().toLowerCase();
        try {
            const resp = await fetch('https://mm-community.onrender.com/verify-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, code: code })
            });
            const res = await resp.json();
            if (res.success) {
                ebene = 1;
                alert("Verbindung zum Keller (DB) steht.");
                if (email === "mmcommunity22@gmail.com") {
                    document.getElementById('admin-panel-haut').style.display = 'block';
                }
            } else { alert("Code ungültig."); }
        } catch (e) { alert("Fehler beim Abgleich."); }
    }

    function echterExit() {
        if (confirm("Möchtest du dich wirklich abmelden?")) {
            location.reload();
        }
    }

    // Beim Laden der Seite wird der Altbestand sofort gerichtet
    window.onload = stelleAltbestandWiederHer;
</script>
</body>
</html>
