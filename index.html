<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M&M-COMMUNITY - Admin Modus</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    <style>
        /* BASIS-LAYOUT */
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        /* DEINE LOGO-STYLES */
        .global-community-label { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; color: #003d8f; z-index: 100; pointer-events: none; }
        .inner-community-label { position: absolute; top: 8px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(0, 61, 143, 0.7); z-index: 20; pointer-events: none; }
        .dashboard-header { width: 100%; position: absolute; top: 3%; display: flex; justify-content: flex-start; padding: 0 2%; box-sizing: border-box; z-index: 20; }
        .logo-ring { width: 110px; height: 110px; border: 3px solid #fff; background-color: #003d8f; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .logo-mm { font-size: 2rem; font-weight: 900; line-height: 0.8; }
        .logo-community { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }

        /* DIE GRÜNE UMRUNDUNG (DEIN WUNSCH) */
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            width: 95%; 
            max-width: 1450px; 
            margin-top: 30px; 
            border: 3px solid #00ff00; /* Der grüne Rahmen */
            padding: 20px; 
            border-radius: 10px; 
            justify-content: flex-start;
        }

        /* DIE BOXEN (ALTBESTAND) */
        .box { width: 320px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 58px; position: relative; overflow: hidden; flex-shrink: 0; }
        
        /* DAS BREITE FUNDAMENT (DEIN WUNSCH) */
        .box-breit { width: 655px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 58px; position: relative; overflow: hidden; flex-shrink: 0; }

        .num { width: 38px; display: flex; align-items: center; justify-content: center; background-color: #003d8f; font-weight: bold; flex-shrink: 0; font-size: 0.85rem; }
        .text { padding: 4px 8px; text-transform: uppercase; font-size: 0.6rem; display: flex; align-items: center; cursor: pointer; flex-grow: 1; font-weight: 600; }

        /* ALLE DEINE ANIMATIONEN & SPEZIAL-STYLES BLEIBEN ERHALTEN */
        @keyframes signalBlink { 0% { box-shadow: 0 0 5px #fff; opacity: 0.8; } 50% { box-shadow: 0 0 25px #fff, 0 0 35px #003d8f; opacity: 1; transform: scale(1.05); } 100% { box-shadow: 0 0 5px #fff; opacity: 0.8; } }
        .signal-aktiv { animation: signalBlink 1.0s infinite ease-in-out !important; border: 2px solid #fff !important; cursor: pointer; }
        
        /* ... (Restliche Styles wie .info-section, .chat-area etc. wie in deinem Original) ... */
        .info-section { width: 80%; height: 26vh; border: 2px solid #003d8f; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #000; position: relative; overflow: hidden; margin-top: 2vh; }
        #chat-area { width: 90%; flex-grow: 1; display: none; flex-direction: column; margin-bottom: 70px; }
        #chat-box { height: 45vh; padding: 15px; color: #fff; overflow-y: auto; border: 1px solid #003d8f; background: rgba(0,0,0,0.5); }
        .bottom-nav { display: flex; justify-content: space-between; width: 100%; padding: 10px 20px; position: fixed; bottom: 0; background: #000; z-index: 100; }
        .nav-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="top-label" class="global-community-label">Von M&M Community</div>

    <div id="dashboard" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="dashboard-header">
            <div class="logo-ring"><div class="logo-mm">M&M</div><div class="logo-community">COMMUNITY</div></div>
        </div>

        <!-- DEINE INFO SECTION -->
        <div class="info-section">
             <div class="inner-community-label">Von M&M Community</div>
             <!-- Login Bereich etc. -->
             <div id="auth-wrapper" style="margin-top: 15px; display: flex; background: rgba(0, 61, 143, 0.1); border: 1px solid #003d8f; width: 95%; height: 45px;">
                <div id="email-step" style="display: flex; flex: 1; width: 100%;">
                    <input type="email" id="db-anker-mail" placeholder="E-Mail eingeben..." style="flex-grow:1; background:transparent; border:none; color:#fff; padding:10px;">
                    <button onclick="sichereAnkerUndStarteScan()" style="background:#ffd700; border:none; cursor:pointer; padding:0 15px;">ANKER SETZEN</button>
                </div>
                <div id="code-step" style="display: none; flex: 1; width: 100%;">
                    <input type="text" id="verification-code" placeholder="Schlüssel..." maxlength="6" style="flex-grow:1; background:#00ff00; color:#000; text-align:center;">
                    <button onclick="bestatigeCode()" style="background:#fff; border:none; padding:0 20px;">OK</button>
                </div>
             </div>
        </div>

        <!-- DAS GRID MIT GRÜNER UMRUNDUNG -->
        <div class="grid" id="main-grid">
            <!-- Boxen werden per JS geladen -->
        </div>
    </div>

    <!-- ALLE WEITEREN BEREICHE (EBENEN) -->
    <div id="page-skelett" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        <h1 id="info-titel" class="page-title-white"></h1>
        <p id="main-text" style="padding: 20px; color:#ccc;"></p>
        <!-- Chat Area etc. -->
        <div id="chat-area">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" onkeypress="if(event.key==='Enter') registriereSenden()">
        </div>
    </div>

    <div class="bottom-nav">
        <button id="btn-back" class="nav-btn" onclick="showDashboard()">← Dashboard</button>
        <button class="nav-btn" style="background:#0088ff; color:#fff;" onclick="echterExit()">EXIT</button>
    </div>

<script>
    // DEINE VOLLSTÄNDIGEN DATEN
    const themen = ["Recht auf Gefühlsvorderung", "Wie werde ich Mensch", "Glaube an Friede", "Programm für Bürgerliche Rechte", "Moralische Pflicht und Verantwortung", "Menschlichkeit Wiederherstellung", "Kinderschutz-Pflicht-Elternrechte", "Wahre Richtung und Kunst", "LGBTQ und Kirche", "Trend und Tradition", "Religionsbekenntnis oder Selbstwahl", "Gesundheitswesen und Verhalten", "Arbeitswelt und Du", "Mobbing am Arbeitsplatz", "Jugendsprecher", "Ratgeber für Pensionisten", "Sozialgefallen und Widerkehr", "Nachbarschaft und Gemeinschaft", "Alleinerziehend", "Die Brücke", "KAPITAL UND VERWALTUNG", "DAS KOLLEKTIV"];
    
    const sektorTexte = [ /* Deine langen Sektor-Texte hier einfügen wie im Original */ ];

    let ebene = 0, tId = 0, aktuellesThema = "";

    // DIE BAU-FUNKTION (MIT DEINEN SPEZIAL-BOXEN UNTEN)
    function baueGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; 
        themen.forEach((t, i) => {
            const istBreit = (i >= 20); // 21 & 22
            const klasse = istBreit ? "box-breit" : "box";
            grid.innerHTML += `
            <div class="${klasse}" id="box-${i}">
                <div class="num num-neutral" id="num-${i}">${i+1}</div>
                <div class="text" onclick="pruefeZugang('${t}', ${i})">${t}</div>
            </div>`;
        });
    }

    // ALLE DEINE FUNKTIONEN (Kopie aus deinem Original)
    async function sichereAnkerUndStarteScan() { /* ... */ }
    async function bestatigeCode() { /* ... */ }
    function pruefeZugang(t, i) { 
        if (ebene === 0) { alert("Bitte zuerst Code bestätigen!"); return; }
        tId = i; aktuellesThema = t;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('page-skelett').style.display = 'flex';
        document.getElementById('info-titel').innerText = t;
        document.getElementById('main-text').innerText = sektorTexte[i] || "Text folgt...";
        ebene = 2;
    }
    function showDashboard() { ebene = 1; document.getElementById('page-skelett').style.display = 'none'; document.getElementById('dashboard').style.display = 'flex'; }
    function echterExit() { if(confirm("Abmelden?")) location.reload(); }

    // PeerJS & Video (Dein Original)
    // ... starteVideoKonferenz() etc.

    window.onload = baueGrid;
</script>
</body>
</html>
