<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>M&M-COMMUNITY - Admin Modus</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script> 
    <style>
        /* BASIS-LAYOUT */
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* LOGO & SCHRIFTZÜGE */
        .global-community-label { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; color: #003d8f; z-index: 100; pointer-events: none; }
        .inner-community-label { position: absolute; top: 8px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(0, 61, 143, 0.7); z-index: 20; pointer-events: none; }
        .dashboard-header { width: 100%; position: absolute; top: 3%; display: flex; justify-content: flex-start; padding: 0 2%; box-sizing: border-box; z-index: 20; }
        .logo-ring { width: 110px; height: 110px; border: 3px solid #fff; background-color: #003d8f; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .logo-mm { font-size: 2rem; font-weight: 900; line-height: 0.8; }
        .logo-community { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }

        /* INFO SECTION */
        .info-section { width: 85%; border: 2px solid #003d8f; background-color: #000; padding: 20px; margin-top: 140px; position: relative; }

        /* DER GRÜNE RAHMEN UM ALLE 22 BOXEN */
        .grid { 
            display: flex; flex-wrap: wrap; gap: 15px; width: 95%; max-width: 1450px; 
            margin-top: 20px; border: 3px solid #00ff00; padding: 25px; border-radius: 10px; 
            justify-content: flex-start; margin-bottom: 100px;
        }

        /* BOXEN STYLES */
        .box { width: 320px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 58px; flex-shrink: 0; }
        .box-breit { width: 655px; display: flex; border: 2px solid #003d8f; background-color: #000; min-height: 58px; flex-shrink: 0; }
        .num { width: 38px; display: flex; align-items: center; justify-content: center; background-color: #003d8f; font-weight: bold; font-size: 0.85rem; }
        .text { padding: 4px 8px; text-transform: uppercase; font-size: 0.6rem; display: flex; align-items: center; cursor: pointer; flex-grow: 1; font-weight: 600; }

        /* EBENEN & CHAT */
        #page-skelett, #chat-area, #drawer-ebene4 { display: none; width: 90%; flex-direction: column; align-items: center; margin-top: 20px; }
        #chat-box { height: 40vh; width: 100%; border: 1px solid #003d8f; background: rgba(0,0,0,0.5); overflow-y: auto; padding: 15px; }

        /* VIDEO */
        .video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .video-slot { aspect-ratio: 16/9; background: #111; border: 1px solid #003d8f; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 20px; display: flex; justify-content: space-between; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* ADMIN */
        #admin-panel-haut { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; background: rgba(0,0,0,0.98); border: 2px solid #ffd700; z-index: 9999; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="top-label" class="global-community-label">Von M&M Community</div>

    <div id="dashboard" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="dashboard-header">
            <div class="logo-ring"><div class="logo-mm">M&M</div><div class="logo-community">COMMUNITY</div></div>
        </div>

        <div class="info-section">
            <div class="inner-community-label">Von M&M Community</div>
            <div id="auth-wrapper" style="display: flex; margin-top: 20px; border: 1px solid #003d8f; height: 45px;">
                <div id="email-step" style="display: flex; flex: 1;">
                    <input type="email" id="db-anker-mail" placeholder="E-Mail eingeben..." style="flex:1; background:transparent; border:none; color:#fff; padding:10px; outline:none;">
                    <button onclick="sichereAnkerUndStarteScan()" class="nav-btn">ANKER SETZEN</button>
                </div>
                <div id="code-step" style="display: none; flex: 1;">
                    <input type="text" id="verification-code" placeholder="Schlüssel..." maxlength="6" style="flex:1; background:#00ff00; color:#000; text-align:center; outline:none; border:none;">
                    <button onclick="bestatigeCode()" style="background:#fff; border:none; padding:0 20px; font-weight:bold; cursor:pointer;">OK</button>
                </div>
            </div>
        </div>

        <div class="grid" id="main-grid"></div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel-haut">
        <h2 style="color: #ffd700; text-align: center;">ADMIN-ZENTRALE</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div id="sector-controls" style="border: 1px solid #003d8f; padding: 10px;"></div>
            <div id="user-stats" style="border: 1px solid #003d8f; padding: 10px;">Lade Seelen...</div>
        </div>
        <button onclick="document.getElementById('admin-panel-haut').style.display='none'" class="nav-btn" style="width:100%; margin-top:20px;">SCHLIESSEN</button>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="location.reload()">← DASHBOARD</button>
        <button class="nav-btn" style="background: #0088ff; color: #fff;" onclick="echterExit()">EXIT / ABMELDEN</button>
    </div>

<script>
    let ebene = 0, tId = 0, aktuellesThema = "";
    const themen = ["Recht auf Gefühlsvorderung", "Wie werde ich Mensch", "Glaube an Friede", "Programm für Bürgerliche Rechte", "Moralische Pflicht und Verantwortung", "Menschlichkeit Wiederherstellung", "Kinderschutz-Pflicht-Elternrechte", "Wahre Richtung und Kunst", "LGBTQ und Kirche", "Trend und Tradition", "Religionsbekenntnis oder Selbstwahl", "Gesundheitswesen und Verhalten", "Arbeitswelt und Du", "Mobbing am Arbeitsplatz", "Jugendsprecher", "Ratgeber für Pensionisten", "Sozialgefallen und Widerkehr", "Nachbarschaft und Gemeinschaft", "Alleinerziehend", "Die Brücke", "KAPITAL UND VERWALTUNG", "DAS KOLLEKTIV"];

    // DER ALTBESTAND DER TEXTE
    const sektorTexte = Array(22).fill("Lade Biografie..."); 

    function baueGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; 
        themen.forEach((t, i) => {
            const klasse = (i >= 20) ? "box-breit" : "box";
            grid.innerHTML += `
            <div class="${klasse}" id="box-${i}">
                <div class="num">${i+1}</div>
                <div class="text" onclick="pruefeZugang('${t}', ${i})">${t}</div>
            </div>`;
        });
    }

    // LOGIN & ANKER
    async function sichereAnkerUndStarteScan() {
        const email = document.getElementById('db-anker-mail').value;
        await fetch('https://mm-community.onrender.com/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
        document.getElementById('email-step').style.display = 'none';
        document.getElementById('code-step').style.display = 'flex';
    }

    async function bestatigeCode() {
        const email = document.getElementById('db-anker-mail').value;
        const code = document.getElementById('verification-code').value;
        const resp = await fetch('https://mm-community.onrender.com/verify-access', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, code}) });
        const res = await resp.json();
        if(res.success) {
            ebene = 1; alert("Anker gesetzt.");
            if(email === "mmcommunity22@gmail.com") aktiviereAdminPanel();
        }
    }

    // ADMIN FUNKTIONEN
    function aktiviereAdminPanel() {
        document.getElementById('admin-panel-haut').style.display = 'block';
        fetch('https://mm-community.onrender.com/admin/stats').then(r => r.json()).then(data => {
            document.getElementById('user-stats').innerHTML = `<h3>Seelen: ${data.total_souls}</h3>`;
        });
        erstelleSektorenSteuerung();
    }

    function erstelleSektorenSteuerung() {
        const container = document.getElementById('sector-controls');
        container.innerHTML = "<h3>Sektor-Regler</h3>";
        for(let i=0; i<22; i++) {
            const b = document.createElement('button');
            b.innerText = i+1;
            b.onclick = () => fetch('https://mm-community.onrender.com/admin/update-sector', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sector_id: i, status: 'open'}) });
            container.appendChild(b);
        }
    }

    // PEERJS VIDEO
    const meinPeer = new Peer(`M-M-Sektor-Video`);
    async function starteVideoKonferenz() {
        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById('v-slot-1').innerHTML = `<video id="v" autoplay muted style="width:100%"></video>`;
        document.getElementById('v').srcObject = stream;
    }

    function pruefeZugang(t, i) {
        if(ebene === 0) return alert("Code bestätigt?");
        tId = i; aktuellesThema = t;
        alert("Sektor " + (i+1) + " betreten.");
    }

    function echterExit() { if(confirm("Abmelden?")) location.reload(); }

    window.onload = baueGrid;
</script>
</body>
</html>
